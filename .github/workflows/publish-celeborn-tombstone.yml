name: publish-celeborn-tombstone

# One-shot tombstone publish for the OLD PyPI project `celeborn` (CELE-t460).
#
# The product renamed to `celeborn-code` (see publish-pypi.yml for the real release flow).
# PyPI has no edit-description API — the project page always renders the latest release's
# README — so the only way to leave a "renamed to celeborn-code" pointer on the old page
# is one final metadata-only release. That stub lives in packaging/pypi-tombstone/: no
# code, a README pointer, and a dependency on celeborn-code so a stale
# `pip install celeborn` still delivers the real CLI.
#
# Auth is PyPI Trusted Publishing (OIDC) — NO API tokens. One-time setup on the OLD project:
#   https://pypi.org/manage/project/celeborn/settings/publishing/ -> add a GitHub publisher:
#       owner `cloud-dancer-labs`, repo `celeborn-code`,
#       workflow `publish-celeborn-tombstone.yml`, env `pypi`
# (Same `pypi` GitHub Environment as real releases, so the required-reviewer approval
#  gates this publish too.)
#
# Manual trigger only — deliberately NOT tag-triggered, so ordinary `v*` release tags can
# never publish to the deprecated project. Run it from the Actions tab (or `gh workflow
# run publish-celeborn-tombstone.yml`) exactly once per tombstone version.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build tombstone sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build packaging/pypi-tombstone --outdir dist

      - name: Smoke-test — installing 'celeborn' must deliver the celeborn-code CLI
        run: |
          python -m venv /tmp/v && /tmp/v/bin/pip install dist/*.whl
          /tmp/v/bin/celeborn version

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  pypi:
    # Publishes to the OLD `celeborn` project — gated by the `pypi` environment approval.
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1

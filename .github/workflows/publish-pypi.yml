name: publish-pypi

# Local --> Prod for the Celeborn CLI distribution.
#
#   Local : `python -m build` + smoke-test a clean wheel install (you, before tagging). See RELEASING.md.
#   Prod  : only a FINAL tag (vX.Y.Z, no rc/a/b/dev suffix) publishes to real PyPI, AND only after the
#           `pypi` GitHub Environment's required-reviewer approval — that approval IS the release gate.
#   (TestPyPI leg removed 2026-07-10, operator decision — PyPI only. Prerelease tags now just build.)
#
# Auth is PyPI Trusted Publishing (OIDC) — NO API tokens in secrets. One-time setup:
#   PyPI: https://pypi.org/manage/project/celeborn-code/settings/publishing/ -> add a GitHub publisher:
#       owner `cloud-dancer-labs`, repo `celeborn-code`, workflow `publish-pypi.yml`, env `pypi`
#   (The package publishes as `celeborn-code`; the old PyPI project `celeborn` is deprecated — releases
#    <= 0.2.0 live there, yanked. The GitHub repo rename celeborn -> celeborn-code is why: PyPI
#    publishers don't follow repo renames, so the publisher must always say repo `celeborn-code`.)
# Then in repo Settings -> Environments, create `pypi` (required reviewers).
#
# Release flow:
#   git tag v0.2.1 && git push origin v0.2.1     # -> builds, then waits on `pypi` approval -> PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.classify.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Guard — tag must match pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PYV="$(python -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "tag=$TAG pyproject=$PYV"
          if [ "$TAG" != "$PYV" ]; then
            echo "::error::Tag ($TAG) != pyproject version ($PYV). Bump pyproject before tagging."
            exit 1
          fi

      - name: Classify tag (final vs prerelease)
        id: classify
        run: |
          if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Smoke-test the wheel
        run: |
          python -m venv /tmp/v && /tmp/v/bin/pip install dist/*.whl
          /tmp/v/bin/celeborn version

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  pypi:
    # PROD: only FINAL tags, only after the `pypi` environment approval.
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && needs.build.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1

name: release

# Build standalone `celeborn` binaries for macOS (arm64 + x86_64) on a version tag, then attach them
# to the GitHub Release. Homebrew/Scoop/winget manifests point at these assets.
#
# Windows is intentionally NOT built yet — no Windows tester on hand to validate it. The build path
# (packaging/build-binary.ps1) and the winget manifests stay in the tree; re-add the windows-latest
# matrix entry below when there's someone to test the .exe.
#
# Tag to release:  git tag v0.1.0 && git push origin v0.1.0
#
# Code signing/notarization is intentionally NOT wired here yet — it needs the org's Apple Developer
# ID (macOS) and Authenticode (Windows) certs as repo secrets. Until then, users may see an
# "unidentified developer" warning. See packaging/README.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # create/upload to the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14      # Apple silicon (arm64)
            asset: celeborn-macos-arm64
            ext: ""
          - os: macos-13      # Intel (x86_64)
            asset: celeborn-macos-x86_64
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build binary
        run: bash packaging/build-binary.sh

      - name: Stage + checksum
        shell: bash
        run: |
          mkdir -p out
          cp "dist/celeborn${{ matrix.ext }}" "out/${{ matrix.asset }}${{ matrix.ext }}"
          cd out
          if command -v shasum >/dev/null; then
            shasum -a 256 "${{ matrix.asset }}${{ matrix.ext }}" > "${{ matrix.asset }}${{ matrix.ext }}.sha256"
          else
            sha256sum "${{ matrix.asset }}${{ matrix.ext }}" > "${{ matrix.asset }}${{ matrix.ext }}.sha256"
          fi

      - name: Smoke test
        shell: bash
        run: "./dist/celeborn${{ matrix.ext }} version"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
